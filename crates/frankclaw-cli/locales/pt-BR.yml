_version: 1
audit.auth.disabled: Autenticação do gateway está desabilitada — qualquer pessoa com acesso à rede pode se conectar
audit.auth.disabled_fix: "Defina gateway.auth para o modo token ou senha. Execute: frankclaw gen-token"
audit.auth.password_empty: Autenticação por senha está configurada mas o hash da senha está vazio
audit.auth.password_empty_fix: "Defina um hash de senha: frankclaw hash-password"
audit.auth.token_short: Token do gateway tem menos de 16 caracteres
audit.auth.token_short_fix: "Gere um token mais forte: frankclaw gen-token"
audit.channels.invalid_policy: "Canal '%{channel}' possui uma política de segurança inválida"
audit.channels.invalid_policy_fix: Verifique a configuração extra do canal para campos de política válidos
audit.channels.open_groups: "Canal '%{channel}' responde a todas as mensagens de grupo sem exigência de menção ou lista de permitidos"
audit.channels.open_groups_fix: "Defina extra.require_mention_for_groups=true ou configure extra.allowed_groups para '%{channel}'"
audit.channels.whatsapp_no_secret: Canal WhatsApp não possui app_secret — assinaturas de webhook não são verificadas
audit.channels.whatsapp_no_secret_fix: Defina app_secret_env na configuração da conta WhatsApp
audit.clean: Nenhum problema de segurança encontrado. A configuração está correta.
audit.encrypt.media_off: Criptografia de arquivos de mídia está desabilitada
audit.encrypt.media_off_fix: Defina security.encrypt_media como true se os arquivos de mídia contiverem conteúdo sensível
audit.encrypt.no_master_key: Criptografia de sessões está habilitada mas FRANKCLAW_MASTER_KEY não está definida — as sessões falharão
audit.encrypt.no_master_key_fix: "Gere e exporte: export FRANKCLAW_MASTER_KEY=$(frankclaw gen-token)"
audit.encrypt.sessions_off: Criptografia de transcrições de sessão está desabilitada — transcrições armazenadas em texto puro
audit.encrypt.sessions_off_fix: Defina security.encrypt_sessions como true e exporte FRANKCLAW_MASTER_KEY
audit.failed: Auditoria FALHOU — corrija os problemas críticos/altos antes de implantar.
audit.fix_label: "Correção: %{remediation}"
audit.fs.config_world_readable: "Arquivo de configuração possui permissões %{mode} — legível por outros usuários"
audit.fs.config_world_readable_fix: "chmod 600 %{path}"
audit.fs.db_world_readable: "Banco de dados de sessões possui permissões %{mode} — legível por outros usuários"
audit.fs.db_world_readable_fix: "chmod 600 %{path}"
audit.fs.state_world_readable: "Diretório de estado possui permissões %{mode} — acessível por outros usuários"
audit.fs.state_world_readable_fix: "chmod 700 %{path}"
audit.media.scanning_off: Nenhum serviço de verificação de arquivos configurado — arquivos são armazenados sem verificação de malware
audit.media.scanning_off_fix: Defina a variável de ambiente VIRUSTOTAL_API_KEY para habilitar a verificação pelo VirusTotal
audit.media.scanning_on: Verificação de arquivos pelo VirusTotal está habilitada — arquivos são escaneados contra malware antes do armazenamento
audit.media.scanning_on_fix: Nenhuma ação necessária
audit.network.exposed_no_auth: Gateway está exposto na rede sem autenticação
audit.network.exposed_no_auth_fix: "Vincule apenas ao loopback ou configure autenticação: frankclaw gen-token"
audit.network.no_tls: Gateway está exposto na rede sem TLS — credenciais enviadas em texto puro
audit.network.no_tls_fix: Configure TLS, use um proxy reverso com terminação TLS ou restrinja a uma rede Tailscale
audit.network.ssrf_off: Proteção contra SSRF está desabilitada — requisições de saída podem alcançar redes privadas
audit.network.ssrf_off_fix: Defina security.ssrf_protection como true
audit.passed: Auditoria aprovada com avisos.
audit.secrets.channel_missing_env: "Canal '%{channel}' referencia variável de ambiente '%{env}' (via %{key}) que não está definida"
audit.secrets.channel_missing_env_fix: "Exporte: export %{env}=<valor>"
audit.secrets.inline: "Canal '%{channel}' possui '%{key}' armazenado inline no arquivo de configuração"
audit.secrets.inline_fix: "Mova para variável de ambiente: renomeie '%{key}' para '%{env_key}' e defina o valor no ambiente"
audit.secrets.missing_env: "Provedor '%{id}' referencia variável de ambiente '%{env}' que não está definida"
audit.secrets.missing_env_fix: "Exporte a chave de API: export %{env}=<sua-chave>"
audit.secrets.no_key_ref: "Provedor '%{id}' não possui api_key_ref — a chave de API pode estar ausente ou codificada em outro lugar"
audit.secrets.no_key_ref_fix: "Defina models.providers[%{id}].api_key_ref para o nome de uma variável de ambiente"
audit.secrets.token_inline: Token de autenticação do gateway está armazenado inline no arquivo de configuração
audit.secrets.token_inline_fix: Certifique-se de que as permissões do arquivo de configuração são 0600 (somente proprietário). Considere usar a variável de ambiente FRANKCLAW_AUTH_TOKEN se suportado.
audit.separator: ================================
audit.summary: "Resumo: %{crit} crítico(s), %{high} alto(s), %{med} médio(s), %{low} baixo(s), %{info} informativo(s)"
audit.title: Auditoria de Segurança FrankClaw
audit.tools.approval_level: "Nível de aprovação de ferramentas: %{level}"
audit.tools.approval_level_fix: "Defina FRANKCLAW_TOOL_APPROVAL=readonly|mutating|destructive para controlar"
audit.tools.bash_allow_all: Política da ferramenta bash é allow-all — agentes podem executar qualquer comando shell
audit.tools.bash_allow_all_fix: Defina FRANKCLAW_BASH_POLICY para uma lista separada por vírgulas de binários permitidos, ou deny-all
audit.tools.bash_allowlist: "Lista de permitidos da ferramenta bash permite %{count} comando(s): %{commands}"
audit.tools.bash_allowlist_fix: Revise a lista de permitidos e remova quaisquer comandos desnecessários
audit.tools.bash_deny_all: Ferramenta bash está configurada para agentes mas a política é deny-all (padrão seguro)
audit.tools.bash_deny_all_fix: Se a execução de bash for necessária, defina FRANKCLAW_BASH_POLICY para uma lista de permitidos
audit.tools.destructive_approved: Ferramentas destrutivas estão aprovadas — agentes podem realizar operações irreversíveis
audit.tools.destructive_approved_fix: Defina FRANKCLAW_TOOL_APPROVAL=mutating ou readonly a menos que operações destrutivas sejam intencionais
audit.tools.mutating_approved: Ferramentas com mutação estão aprovadas — agentes podem clicar, digitar e executar comandos shell
audit.tools.mutating_approved_fix: Defina FRANKCLAW_TOOL_APPROVAL=readonly se mutação não for necessária
audit.tools.no_sandbox: Ferramenta bash não possui sandbox — comandos executam diretamente no host
audit.tools.no_sandbox_fix: Defina FRANKCLAW_SANDBOX=ai-jail ou ai-jail-lockdown para isolamento em nível de SO (requer ai-jail)
audit.tools.sandbox_aijail: "Sandbox da ferramenta bash: ai-jail (bubblewrap + landlock, rede permitida)"
audit.tools.sandbox_aijail_fix: Para isolamento mais restrito, use FRANKCLAW_SANDBOX=ai-jail-lockdown
audit.tools.sandbox_lockdown: "Sandbox da ferramenta bash: ai-jail lockdown (sistema de arquivos somente leitura, sem rede)"
audit.tools.sandbox_lockdown_fix: Este é o modo de sandbox mais restritivo
audit.tools.sandbox_missing: "FRANKCLAW_SANDBOX=%{mode} está definido mas o binário ai-jail não foi encontrado no PATH"
audit.tools.sandbox_missing_fix: Instale o ai-jail ou remova FRANKCLAW_SANDBOX
