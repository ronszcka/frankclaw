_version: 1
audit.auth.disabled: Gateway-Authentifizierung ist deaktiviert — jeder mit Netzwerkzugang kann sich verbinden
audit.auth.disabled_fix: "Setzen Sie gateway.auth auf Token- oder Passwort-Modus. Ausführen: frankclaw gen-token"
audit.auth.password_empty: Passwort-Authentifizierung ist konfiguriert, aber Passwort-Hash ist leer
audit.auth.password_empty_fix: "Setzen Sie einen Passwort-Hash: frankclaw hash-password"
audit.auth.token_short: Gateway-Token ist kürzer als 16 Zeichen
audit.auth.token_short_fix: "Generieren Sie ein stärkeres Token: frankclaw gen-token"
audit.channels.invalid_policy: "Kanal '%{channel}' hat eine ungültige Sicherheitsrichtlinie"
audit.channels.invalid_policy_fix: Überprüfen Sie die zusätzliche Konfiguration des Kanals auf gültige Richtlinienfelder
audit.channels.open_groups: "Kanal '%{channel}' antwortet auf alle Gruppennachrichten ohne Erwähnungs-Gating oder Erlaubnisliste"
audit.channels.open_groups_fix: "Setzen Sie extra.require_mention_for_groups=true oder konfigurieren Sie extra.allowed_groups für '%{channel}'"
audit.channels.whatsapp_no_secret: WhatsApp-Kanal hat kein app_secret — Webhook-Signaturen werden nicht verifiziert
audit.channels.whatsapp_no_secret_fix: Setzen Sie app_secret_env in der WhatsApp-Kontokonfiguration
audit.clean: Keine Sicherheitsprobleme gefunden. Konfiguration sieht gut aus.
audit.encrypt.media_off: Mediendatei-Verschlüsselung ist deaktiviert
audit.encrypt.media_off_fix: Setzen Sie security.encrypt_media auf true, wenn Mediendateien sensible Inhalte enthalten
audit.encrypt.no_master_key: Sitzungsverschlüsselung ist aktiviert, aber FRANKCLAW_MASTER_KEY ist nicht gesetzt — Sitzungen werden fehlschlagen
audit.encrypt.no_master_key_fix: "Generieren und exportieren: export FRANKCLAW_MASTER_KEY=$(frankclaw gen-token)"
audit.encrypt.sessions_off: Sitzungsprotokoll-Verschlüsselung ist deaktiviert — Protokolle werden im Klartext gespeichert
audit.encrypt.sessions_off_fix: Setzen Sie security.encrypt_sessions auf true und exportieren Sie FRANKCLAW_MASTER_KEY
audit.failed: Prüfung FEHLGESCHLAGEN — beheben Sie kritische/hohe Probleme vor dem Deployment.
audit.fix_label: "Behebung: %{remediation}"
audit.fs.config_world_readable: "Konfigurationsdatei hat Berechtigungen %{mode} — von anderen Benutzern lesbar"
audit.fs.config_world_readable_fix: "chmod 600 %{path}"
audit.fs.db_world_readable: "Sitzungsdatenbank hat Berechtigungen %{mode} — von anderen Benutzern lesbar"
audit.fs.db_world_readable_fix: "chmod 600 %{path}"
audit.fs.state_world_readable: "Statusverzeichnis hat Berechtigungen %{mode} — für andere Benutzer zugänglich"
audit.fs.state_world_readable_fix: "chmod 700 %{path}"
audit.media.scanning_off: Kein Dateiscanning-Dienst konfiguriert — Dateien werden ohne Malware-Prüfung gespeichert
audit.media.scanning_off_fix: Setzen Sie die VIRUSTOTAL_API_KEY Umgebungsvariable, um VirusTotal-Scanning zu aktivieren
audit.media.scanning_on: VirusTotal-Dateiscanning ist aktiviert — Dateien werden vor der Speicherung auf Malware geprüft
audit.media.scanning_on_fix: Keine Aktion erforderlich
audit.network.exposed_no_auth: Gateway ist netzwerkweit erreichbar ohne Authentifizierung
audit.network.exposed_no_auth_fix: "Entweder nur an Loopback binden oder Authentifizierung konfigurieren: frankclaw gen-token"
audit.network.no_tls: Gateway ist netzwerkweit erreichbar ohne TLS — Zugangsdaten werden im Klartext gesendet
audit.network.no_tls_fix: TLS konfigurieren, einen Reverse-Proxy mit TLS-Terminierung verwenden oder auf ein Tailscale-Netzwerk beschränken
audit.network.ssrf_off: SSRF-Schutz ist deaktiviert — ausgehende Anfragen können private Netzwerke erreichen
audit.network.ssrf_off_fix: Setzen Sie security.ssrf_protection auf true
audit.passed: Prüfung bestanden mit Warnungen.
audit.secrets.channel_missing_env: "Kanal '%{channel}' referenziert Umgebungsvariable '%{env}' (über %{key}), die nicht gesetzt ist"
audit.secrets.channel_missing_env_fix: "Exportieren: export %{env}=<Wert>"
audit.secrets.inline: "Kanal '%{channel}' hat '%{key}' direkt in der Konfigurationsdatei gespeichert"
audit.secrets.inline_fix: "In Umgebungsvariable verschieben: '%{key}' in '%{env_key}' umbenennen und den Wert in der Umgebung setzen"
audit.secrets.missing_env: "Anbieter '%{id}' referenziert Umgebungsvariable '%{env}', die nicht gesetzt ist"
audit.secrets.missing_env_fix: "API-Schlüssel exportieren: export %{env}=<Ihr-Schlüssel>"
audit.secrets.no_key_ref: "Anbieter '%{id}' hat keine api_key_ref — API-Schlüssel fehlt möglicherweise oder ist anderweitig hartcodiert"
audit.secrets.no_key_ref_fix: "Setzen Sie models.providers[%{id}].api_key_ref auf den Namen einer Umgebungsvariable"
audit.secrets.token_inline: Gateway-Authentifizierungstoken ist direkt in der Konfigurationsdatei gespeichert
audit.secrets.token_inline_fix: Stellen Sie sicher, dass die Konfigurationsdatei Berechtigungen 0600 hat (nur Eigentümer). Erwägen Sie die Verwendung der FRANKCLAW_AUTH_TOKEN Umgebungsvariable.
audit.separator: ============================
audit.summary: "Zusammenfassung: %{crit} kritisch, %{high} hoch, %{med} mittel, %{low} niedrig, %{info} info"
audit.title: FrankClaw Sicherheitsprüfung
audit.tools.approval_level: "Werkzeug-Genehmigungsstufe: %{level}"
audit.tools.approval_level_fix: "Setzen Sie FRANKCLAW_TOOL_APPROVAL=readonly|mutating|destructive zur Steuerung"
audit.tools.bash_allow_all: Bash-Werkzeugrichtlinie ist allow-all — Agenten können beliebige Shell-Befehle ausführen
audit.tools.bash_allow_all_fix: Setzen Sie FRANKCLAW_BASH_POLICY auf eine kommagetrennte Erlaubnisliste erlaubter Programme oder deny-all
audit.tools.bash_allowlist: "Bash-Werkzeug-Erlaubnisliste erlaubt %{count} Befehl(e): %{commands}"
audit.tools.bash_allowlist_fix: Überprüfen Sie die Erlaubnisliste und entfernen Sie unnötige Befehle
audit.tools.bash_deny_all: Bash-Werkzeug ist für Agenten konfiguriert, aber Richtlinie ist deny-all (sichere Standardeinstellung)
audit.tools.bash_deny_all_fix: Falls Bash-Ausführung benötigt wird, setzen Sie FRANKCLAW_BASH_POLICY auf eine Erlaubnisliste
audit.tools.destructive_approved: Destruktive Werkzeuge sind genehmigt — Agenten können irreversible Operationen ausführen
audit.tools.destructive_approved_fix: Setzen Sie FRANKCLAW_TOOL_APPROVAL=mutating oder readonly, es sei denn, destruktive Operationen sind beabsichtigt
audit.tools.mutating_approved: Mutierende Werkzeuge sind genehmigt — Agenten können klicken, tippen und Shell-Befehle ausführen
audit.tools.mutating_approved_fix: Setzen Sie FRANKCLAW_TOOL_APPROVAL=readonly, wenn Mutationen nicht benötigt werden
audit.tools.no_sandbox: Bash-Werkzeug hat keine Sandbox — Befehle werden direkt auf dem Host ausgeführt
audit.tools.no_sandbox_fix: Setzen Sie FRANKCLAW_SANDBOX=ai-jail oder ai-jail-lockdown für Betriebssystem-Isolation (erfordert ai-jail)
audit.tools.sandbox_aijail: "Bash-Werkzeug-Sandbox: ai-jail (bubblewrap + landlock, Netzwerk erlaubt)"
audit.tools.sandbox_aijail_fix: Für strengere Isolation verwenden Sie FRANKCLAW_SANDBOX=ai-jail-lockdown
audit.tools.sandbox_lockdown: "Bash-Werkzeug-Sandbox: ai-jail lockdown (schreibgeschütztes Dateisystem, kein Netzwerk)"
audit.tools.sandbox_lockdown_fix: Dies ist der restriktivste Sandbox-Modus
audit.tools.sandbox_missing: "FRANKCLAW_SANDBOX=%{mode} ist gesetzt, aber ai-jail-Binary wurde nicht im PATH gefunden"
audit.tools.sandbox_missing_fix: Installieren Sie ai-jail oder entfernen Sie FRANKCLAW_SANDBOX
