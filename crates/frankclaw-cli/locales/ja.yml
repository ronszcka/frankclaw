_version: 1
audit.auth.disabled: ゲートウェイ認証が無効です — ネットワークアクセスできる誰でも接続可能です
audit.auth.disabled_fix: "gateway.auth をトークンまたはパスワードモードに設定してください。実行: frankclaw gen-token"
audit.auth.password_empty: パスワード認証が設定されていますが、パスワードハッシュが空です
audit.auth.password_empty_fix: "パスワードハッシュを設定してください: frankclaw hash-password"
audit.auth.token_short: ゲートウェイトークンが16文字未満です
audit.auth.token_short_fix: "より強力なトークンを生成してください: frankclaw gen-token"
audit.channels.invalid_policy: "チャンネル '%{channel}' のセキュリティポリシーが無効です"
audit.channels.invalid_policy_fix: チャンネルの追加設定で有効なポリシーフィールドを確認してください
audit.channels.open_groups: "チャンネル '%{channel}' がメンション制限や許可リストなしですべてのグループメッセージに応答します"
audit.channels.open_groups_fix: "'%{channel}' に extra.require_mention_for_groups=true を設定するか、extra.allowed_groups を設定してください"
audit.channels.whatsapp_no_secret: WhatsAppチャンネルに app_secret がありません — Webhook署名が検証されません
audit.channels.whatsapp_no_secret_fix: WhatsAppアカウント設定で app_secret_env を設定してください
audit.clean: セキュリティ上の問題は見つかりませんでした。設定は適切です。
audit.encrypt.media_off: メディアファイルの暗号化が無効です
audit.encrypt.media_off_fix: メディアファイルに機密情報が含まれる場合は security.encrypt_media を true に設定してください
audit.encrypt.no_master_key: セッション暗号化は有効ですが FRANKCLAW_MASTER_KEY が未設定です — セッションが失敗します
audit.encrypt.no_master_key_fix: "生成してエクスポート: export FRANKCLAW_MASTER_KEY=$(frankclaw gen-token)"
audit.encrypt.sessions_off: セッション暗号化が無効です — 会話履歴が平文で保存されます
audit.encrypt.sessions_off_fix: security.encrypt_sessions を true に設定し、FRANKCLAW_MASTER_KEY をエクスポートしてください
audit.failed: 監査に不合格 — デプロイ前にCRIT/HIGHの問題を修正してください。
audit.fix_label: "修正方法: %{remediation}"
audit.fs.config_world_readable: "設定ファイルのパーミッションが %{mode} です — 他のユーザーが読み取り可能です"
audit.fs.config_world_readable_fix: "chmod 600 %{path}"
audit.fs.db_world_readable: "セッションデータベースのパーミッションが %{mode} です — 他のユーザーが読み取り可能です"
audit.fs.db_world_readable_fix: "chmod 600 %{path}"
audit.fs.state_world_readable: "ステートディレクトリのパーミッションが %{mode} です — 他のユーザーがアクセス可能です"
audit.fs.state_world_readable_fix: "chmod 700 %{path}"
audit.media.scanning_off: ファイルスキャンサービスが設定されていません — ファイルがマルウェアチェックなしで保存されます
audit.media.scanning_off_fix: VirusTotalスキャンを有効にするには VIRUSTOTAL_API_KEY 環境変数を設定してください
audit.media.scanning_on: VirusTotalファイルスキャンが有効です — ファイルは保存前にマルウェアスキャンされます
audit.media.scanning_on_fix: 対応不要です
audit.network.exposed_no_auth: ゲートウェイが認証なしでネットワークに公開されています
audit.network.exposed_no_auth_fix: "ループバックのみにバインドするか、認証を設定してください: frankclaw gen-token"
audit.network.no_tls: ゲートウェイがTLSなしでネットワークに公開されています — 認証情報が平文で送信されます
audit.network.no_tls_fix: TLSを設定するか、TLS終端付きのリバースプロキシを使用するか、Tailscaleネットワークに制限してください
audit.network.ssrf_off: SSRF保護が無効です — 送信リクエストがプライベートネットワークに到達可能です
audit.network.ssrf_off_fix: security.ssrf_protection を true に設定してください
audit.passed: 監査は警告付きで合格しました。
audit.secrets.channel_missing_env: "チャンネル '%{channel}' が参照する環境変数 '%{env}' (%{key} 経由) が設定されていません"
audit.secrets.channel_missing_env_fix: "エクスポートしてください: export %{env}=<value>"
audit.secrets.inline: "チャンネル '%{channel}' の '%{key}' が設定ファイルに直接記述されています"
audit.secrets.inline_fix: "環境変数に移行してください: '%{key}' を '%{env_key}' にリネームし、値を環境変数に設定"
audit.secrets.missing_env: "プロバイダ '%{id}' が参照する環境変数 '%{env}' が設定されていません"
audit.secrets.missing_env_fix: "APIキーをエクスポートしてください: export %{env}=<your-key>"
audit.secrets.no_key_ref: "プロバイダ '%{id}' に api_key_ref がありません — APIキーが未設定またはハードコードされている可能性があります"
audit.secrets.no_key_ref_fix: "models.providers[%{id}].api_key_ref を環境変数名に設定してください"
audit.secrets.token_inline: ゲートウェイ認証トークンが設定ファイルに直接記述されています
audit.secrets.token_inline_fix: 設定ファイルのパーミッションを 0600 (所有者のみ) にしてください。FRANKCLAW_AUTH_TOKEN 環境変数の使用も検討してください。
audit.separator: ========================
audit.summary: "概要: %{crit} CRIT, %{high} HIGH, %{med} MED, %{low} LOW, %{info} INFO"
audit.title: FrankClaw セキュリティ監査
audit.tools.approval_level: "ツール承認レベル: %{level}"
audit.tools.approval_level_fix: "FRANKCLAW_TOOL_APPROVAL=readonly|mutating|destructive で制御してください"
audit.tools.bash_allow_all: Bashツールのポリシーがallow-allです — エージェントが任意のシェルコマンドを実行できます
audit.tools.bash_allow_all_fix: FRANKCLAW_BASH_POLICY を許可するバイナリのカンマ区切りリスト、またはdeny-allに設定してください
audit.tools.bash_allowlist: "Bashツールの許可リストに %{count} 個のコマンドが許可されています: %{commands}"
audit.tools.bash_allowlist_fix: 許可リストを確認し、不要なコマンドを削除してください
audit.tools.bash_deny_all: Bashツールがエージェント用に設定されていますが、ポリシーはdeny-allです (安全なデフォルト)
audit.tools.bash_deny_all_fix: Bash実行が必要な場合は、FRANKCLAW_BASH_POLICY を許可リストに設定してください
audit.tools.destructive_approved: 破壊的ツールが承認済みです — エージェントが不可逆な操作を実行できます
audit.tools.destructive_approved_fix: 破壊的操作が意図的でない限り、FRANKCLAW_TOOL_APPROVAL=mutating または readonly を設定してください
audit.tools.mutating_approved: 変更ツールが承認済みです — エージェントがクリック、入力、シェルコマンド実行を行えます
audit.tools.mutating_approved_fix: 変更操作が不要な場合は FRANKCLAW_TOOL_APPROVAL=readonly を設定してください
audit.tools.no_sandbox: Bashツールにサンドボックスがありません — コマンドがホスト上で直接実行されます
audit.tools.no_sandbox_fix: OS レベルの分離のために FRANKCLAW_SANDBOX=ai-jail または ai-jail-lockdown を設定してください (ai-jail が必要)
audit.tools.sandbox_aijail: "Bashツールサンドボックス: ai-jail (bubblewrap + landlock, ネットワーク許可)"
audit.tools.sandbox_aijail_fix: より厳格な分離には FRANKCLAW_SANDBOX=ai-jail-lockdown を使用してください
audit.tools.sandbox_lockdown: "Bashツールサンドボックス: ai-jail lockdown (読み取り専用ファイルシステム, ネットワーク不可)"
audit.tools.sandbox_lockdown_fix: これは最も制限の厳しいサンドボックスモードです
audit.tools.sandbox_missing: "FRANKCLAW_SANDBOX=%{mode} が設定されていますが、ai-jail バイナリがPATH上に見つかりません"
audit.tools.sandbox_missing_fix: ai-jail をインストールするか、FRANKCLAW_SANDBOX の設定を解除してください
