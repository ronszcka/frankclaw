_version: 1
audit.auth.disabled: A autenticação do gateway está desactivada — qualquer pessoa com acesso à rede pode ligar-se
audit.auth.disabled_fix: "Defina gateway.auth para o modo token ou palavra-passe. Execute: frankclaw gen-token"
audit.auth.password_empty: A autenticação por palavra-passe está configurada mas o hash da palavra-passe está vazio
audit.auth.password_empty_fix: "Defina um hash de palavra-passe: frankclaw hash-password"
audit.auth.token_short: O token do gateway tem menos de 16 caracteres
audit.auth.token_short_fix: "Gere um token mais forte: frankclaw gen-token"
audit.channels.invalid_policy: "O canal '%{channel}' tem uma política de segurança inválida"
audit.channels.invalid_policy_fix: Verifique a configuração extra do canal para campos de política válidos
audit.channels.open_groups: "O canal '%{channel}' responde a todas as mensagens de grupo sem exigência de menção ou lista de permitidos"
audit.channels.open_groups_fix: "Defina extra.require_mention_for_groups=true ou configure extra.allowed_groups para '%{channel}'"
audit.channels.whatsapp_no_secret: O canal WhatsApp não tem app_secret — as assinaturas de webhook não são verificadas
audit.channels.whatsapp_no_secret_fix: Defina app_secret_env na configuração da conta WhatsApp
audit.clean: Nenhum problema de segurança encontrado. A configuração parece correcta.
audit.encrypt.media_off: A encriptação de ficheiros multimédia está desactivada
audit.encrypt.media_off_fix: Defina security.encrypt_media como true se os ficheiros multimédia contiverem conteúdo sensível
audit.encrypt.no_master_key: A encriptação de sessões está activada mas FRANKCLAW_MASTER_KEY não está definida — as sessões irão falhar
audit.encrypt.no_master_key_fix: "Gere e exporte: export FRANKCLAW_MASTER_KEY=$(frankclaw gen-token)"
audit.encrypt.sessions_off: A encriptação de transcrições de sessões está desactivada — transcrições armazenadas em texto simples
audit.encrypt.sessions_off_fix: Defina security.encrypt_sessions como true e exporte FRANKCLAW_MASTER_KEY
audit.failed: A auditoria FALHOU — corrija os problemas críticos/altos antes de implementar.
audit.fix_label: "Correcção: %{remediation}"
audit.fs.config_world_readable: "O ficheiro de configuração tem permissões %{mode} — legível por outros utilizadores"
audit.fs.config_world_readable_fix: "chmod 600 %{path}"
audit.fs.db_world_readable: "A base de dados de sessões tem permissões %{mode} — legível por outros utilizadores"
audit.fs.db_world_readable_fix: "chmod 600 %{path}"
audit.fs.state_world_readable: "O directório de estado tem permissões %{mode} — acessível por outros utilizadores"
audit.fs.state_world_readable_fix: "chmod 700 %{path}"
audit.media.scanning_off: Nenhum serviço de análise de ficheiros configurado — os ficheiros são armazenados sem verificação de malware
audit.media.scanning_off_fix: Defina a variável de ambiente VIRUSTOTAL_API_KEY para activar a análise VirusTotal
audit.media.scanning_on: A análise de ficheiros VirusTotal está activada — os ficheiros são analisados quanto a malware antes do armazenamento
audit.media.scanning_on_fix: Nenhuma acção necessária
audit.network.exposed_no_auth: O gateway está exposto na rede sem autenticação
audit.network.exposed_no_auth_fix: "Ligue apenas ao loopback, ou configure a autenticação: frankclaw gen-token"
audit.network.no_tls: O gateway está exposto na rede sem TLS — credenciais enviadas em texto simples
audit.network.no_tls_fix: Configure TLS, utilize um proxy reverso com terminação TLS, ou restrinja a uma rede Tailscale
audit.network.ssrf_off: A protecção SSRF está desactivada — pedidos de saída podem alcançar redes privadas
audit.network.ssrf_off_fix: Defina security.ssrf_protection como true
audit.passed: A auditoria passou com avisos.
audit.secrets.channel_missing_env: "O canal '%{channel}' referencia a variável de ambiente '%{env}' (via %{key}) que não está definida"
audit.secrets.channel_missing_env_fix: "Exporte: export %{env}=<valor>"
audit.secrets.inline: "O canal '%{channel}' tem '%{key}' armazenado directamente no ficheiro de configuração"
audit.secrets.inline_fix: "Mova para variável de ambiente: renomeie '%{key}' para '%{env_key}' e defina o valor no ambiente"
audit.secrets.missing_env: "O fornecedor '%{id}' referencia a variável de ambiente '%{env}' que não está definida"
audit.secrets.missing_env_fix: "Exporte a chave API: export %{env}=<a-sua-chave>"
audit.secrets.no_key_ref: "O fornecedor '%{id}' não tem api_key_ref — a chave API pode estar em falta ou codificada noutro local"
audit.secrets.no_key_ref_fix: "Defina models.providers[%{id}].api_key_ref para o nome de uma variável de ambiente"
audit.secrets.token_inline: O token de autenticação do gateway está armazenado directamente no ficheiro de configuração
audit.secrets.token_inline_fix: Certifique-se de que as permissões do ficheiro de configuração são 0600 (apenas proprietário). Considere utilizar a variável de ambiente FRANKCLAW_AUTH_TOKEN, se suportada.
audit.separator: ================================
audit.summary: "Resumo: %{crit} crítico(s), %{high} alto(s), %{med} médio(s), %{low} baixo(s), %{info} informativo(s)"
audit.title: Auditoria de Segurança FrankClaw
audit.tools.approval_level: "Nível de aprovação de ferramentas: %{level}"
audit.tools.approval_level_fix: "Defina FRANKCLAW_TOOL_APPROVAL=readonly|mutating|destructive para controlar"
audit.tools.bash_allow_all: A política da ferramenta bash é allow-all — os agentes podem executar qualquer comando shell
audit.tools.bash_allow_all_fix: Defina FRANKCLAW_BASH_POLICY para uma lista de binários permitidos separados por vírgulas, ou deny-all
audit.tools.bash_allowlist: "A lista de permitidos da ferramenta bash autoriza %{count} comando(s): %{commands}"
audit.tools.bash_allowlist_fix: Reveja a lista de permitidos e remova quaisquer comandos desnecessários
audit.tools.bash_deny_all: A ferramenta bash está configurada para agentes mas a política é deny-all (predefinição segura)
audit.tools.bash_deny_all_fix: Se a execução bash for necessária, defina FRANKCLAW_BASH_POLICY para uma lista de permitidos
audit.tools.destructive_approved: Ferramentas destrutivas aprovadas — os agentes podem efectuar operações irreversíveis
audit.tools.destructive_approved_fix: Defina FRANKCLAW_TOOL_APPROVAL=mutating ou readonly, a menos que operações destrutivas sejam pretendidas
audit.tools.mutating_approved: Ferramentas com mutação aprovadas — os agentes podem clicar, escrever e executar comandos shell
audit.tools.mutating_approved_fix: Defina FRANKCLAW_TOOL_APPROVAL=readonly se a mutação não for necessária
audit.tools.no_sandbox: A ferramenta bash não tem sandbox — os comandos são executados directamente no anfitrião
audit.tools.no_sandbox_fix: Defina FRANKCLAW_SANDBOX=ai-jail ou ai-jail-lockdown para isolamento ao nível do SO (requer ai-jail)
audit.tools.sandbox_aijail: "Sandbox da ferramenta bash: ai-jail (bubblewrap + landlock, rede permitida)"
audit.tools.sandbox_aijail_fix: Para isolamento mais restrito, utilize FRANKCLAW_SANDBOX=ai-jail-lockdown
audit.tools.sandbox_lockdown: "Sandbox da ferramenta bash: ai-jail lockdown (sistema de ficheiros apenas leitura, sem rede)"
audit.tools.sandbox_lockdown_fix: Este é o modo de sandbox mais restritivo
audit.tools.sandbox_missing: "FRANKCLAW_SANDBOX=%{mode} está definido mas o binário ai-jail não foi encontrado no PATH"
audit.tools.sandbox_missing_fix: Instale o ai-jail ou remova FRANKCLAW_SANDBOX
