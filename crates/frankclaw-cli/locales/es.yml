_version: 1
audit.auth.disabled: La autenticación del gateway está deshabilitada — cualquiera con acceso a la red puede conectarse
audit.auth.disabled_fix: "Configure gateway.auth en modo token o contraseña. Ejecute: frankclaw gen-token"
audit.auth.password_empty: La autenticación por contraseña está configurada pero el hash de contraseña está vacío
audit.auth.password_empty_fix: "Configure un hash de contraseña: frankclaw hash-password"
audit.auth.token_short: El token del gateway tiene menos de 16 caracteres
audit.auth.token_short_fix: "Genere un token más fuerte: frankclaw gen-token"
audit.channels.invalid_policy: "El canal '%{channel}' tiene una política de seguridad inválida"
audit.channels.invalid_policy_fix: Verifique la configuración extra del canal para campos de política válidos
audit.channels.open_groups: "El canal '%{channel}' responde a todos los mensajes de grupo sin restricción de mención ni lista de permitidos"
audit.channels.open_groups_fix: "Configure extra.require_mention_for_groups=true o configure extra.allowed_groups para '%{channel}'"
audit.channels.whatsapp_no_secret: El canal de WhatsApp no tiene app_secret — las firmas de webhook no son verificadas
audit.channels.whatsapp_no_secret_fix: Configure app_secret_env en la configuración de la cuenta de WhatsApp
audit.clean: No se encontraron problemas de seguridad. La configuración se ve bien.
audit.encrypt.media_off: El cifrado de archivos multimedia está deshabilitado
audit.encrypt.media_off_fix: Configure security.encrypt_media en true si los archivos multimedia contienen contenido sensible
audit.encrypt.no_master_key: El cifrado de sesiones está habilitado pero FRANKCLAW_MASTER_KEY no está configurada — las sesiones fallarán
audit.encrypt.no_master_key_fix: "Genere y exporte: export FRANKCLAW_MASTER_KEY=$(frankclaw gen-token)"
audit.encrypt.sessions_off: El cifrado de transcripciones de sesión está deshabilitado — las transcripciones se almacenan en texto plano
audit.encrypt.sessions_off_fix: Configure security.encrypt_sessions en true y exporte FRANKCLAW_MASTER_KEY
audit.failed: La auditoría FALLÓ — corrija los problemas críticos/altos antes de desplegar.
audit.fix_label: "Solución: %{remediation}"
audit.fs.config_world_readable: "El archivo de configuración tiene permisos %{mode} — legible por otros usuarios"
audit.fs.config_world_readable_fix: "chmod 600 %{path}"
audit.fs.db_world_readable: "La base de datos de sesiones tiene permisos %{mode} — legible por otros usuarios"
audit.fs.db_world_readable_fix: "chmod 600 %{path}"
audit.fs.state_world_readable: "El directorio de estado tiene permisos %{mode} — accesible por otros usuarios"
audit.fs.state_world_readable_fix: "chmod 700 %{path}"
audit.media.scanning_off: No hay servicio de escaneo de archivos configurado — los archivos se almacenan sin verificación de malware
audit.media.scanning_off_fix: Configure la variable de entorno VIRUSTOTAL_API_KEY para habilitar el escaneo con VirusTotal
audit.media.scanning_on: El escaneo de archivos con VirusTotal está habilitado — los archivos se escanean en busca de malware antes de almacenarse
audit.media.scanning_on_fix: No se requiere acción
audit.network.exposed_no_auth: El gateway está expuesto a la red sin autenticación
audit.network.exposed_no_auth_fix: "Enlace solo a loopback, o configure autenticación: frankclaw gen-token"
audit.network.no_tls: El gateway está expuesto a la red sin TLS — las credenciales se envían en texto plano
audit.network.no_tls_fix: Configure TLS, use un proxy inverso con terminación TLS, o restrinja a una red Tailscale
audit.network.ssrf_off: La protección SSRF está deshabilitada — las solicitudes salientes pueden alcanzar redes privadas
audit.network.ssrf_off_fix: Configure security.ssrf_protection en true
audit.passed: La auditoría pasó con advertencias.
audit.secrets.channel_missing_env: "El canal '%{channel}' hace referencia a la variable de entorno '%{env}' (a través de %{key}) que no está configurada"
audit.secrets.channel_missing_env_fix: "Exporte: export %{env}=<valor>"
audit.secrets.inline: "El canal '%{channel}' tiene '%{key}' almacenado en línea en el archivo de configuración"
audit.secrets.inline_fix: "Mueva a variable de entorno: renombre '%{key}' a '%{env_key}' y configure el valor en el entorno"
audit.secrets.missing_env: "El proveedor '%{id}' hace referencia a la variable de entorno '%{env}' que no está configurada"
audit.secrets.missing_env_fix: "Exporte la clave API: export %{env}=<su-clave>"
audit.secrets.no_key_ref: "El proveedor '%{id}' no tiene api_key_ref — la clave API puede estar faltante o codificada en otro lugar"
audit.secrets.no_key_ref_fix: "Configure models.providers[%{id}].api_key_ref con el nombre de una variable de entorno"
audit.secrets.token_inline: El token de autenticación del gateway está almacenado en línea en el archivo de configuración
audit.secrets.token_inline_fix: Asegúrese de que los permisos del archivo de configuración sean 0600 (solo propietario). Considere usar la variable de entorno FRANKCLAW_AUTH_TOKEN si está soportada.
audit.separator: ===================================
audit.summary: "Resumen: %{crit} crítico(s), %{high} alto(s), %{med} medio(s), %{low} bajo(s), %{info} informativo(s)"
audit.title: Auditoría de Seguridad de FrankClaw
audit.tools.approval_level: "Nivel de aprobación de herramientas: %{level}"
audit.tools.approval_level_fix: "Configure FRANKCLAW_TOOL_APPROVAL=readonly|mutating|destructive para controlar"
audit.tools.bash_allow_all: La política de la herramienta bash es allow-all — los agentes pueden ejecutar cualquier comando de shell
audit.tools.bash_allow_all_fix: Configure FRANKCLAW_BASH_POLICY con una lista separada por comas de binarios permitidos, o deny-all
audit.tools.bash_allowlist: "La lista de permitidos de la herramienta bash permite %{count} comando(s): %{commands}"
audit.tools.bash_allowlist_fix: Revise la lista de permitidos y elimine cualquier comando innecesario
audit.tools.bash_deny_all: La herramienta bash está configurada para agentes pero la política es deny-all (predeterminado seguro)
audit.tools.bash_deny_all_fix: Si se necesita ejecución bash, configure FRANKCLAW_BASH_POLICY con una lista de permitidos
audit.tools.destructive_approved: Las herramientas destructivas están aprobadas — los agentes pueden realizar operaciones irreversibles
audit.tools.destructive_approved_fix: Configure FRANKCLAW_TOOL_APPROVAL=mutating o readonly a menos que las operaciones destructivas sean intencionales
audit.tools.mutating_approved: Las herramientas de mutación están aprobadas — los agentes pueden hacer clic, escribir y ejecutar comandos de shell
audit.tools.mutating_approved_fix: Configure FRANKCLAW_TOOL_APPROVAL=readonly si no se necesita mutación
audit.tools.no_sandbox: La herramienta bash no tiene sandbox — los comandos se ejecutan directamente en el host
audit.tools.no_sandbox_fix: Configure FRANKCLAW_SANDBOX=ai-jail o ai-jail-lockdown para aislamiento a nivel de SO (requiere ai-jail)
audit.tools.sandbox_aijail: "Sandbox de la herramienta bash: ai-jail (bubblewrap + landlock, red permitida)"
audit.tools.sandbox_aijail_fix: Para un aislamiento más estricto, use FRANKCLAW_SANDBOX=ai-jail-lockdown
audit.tools.sandbox_lockdown: "Sandbox de la herramienta bash: ai-jail lockdown (sistema de archivos de solo lectura, sin red)"
audit.tools.sandbox_lockdown_fix: Este es el modo de sandbox más restrictivo
audit.tools.sandbox_missing: "FRANKCLAW_SANDBOX=%{mode} está configurado pero el binario ai-jail no se encontró en el PATH"
audit.tools.sandbox_missing_fix: Instale ai-jail o desactive FRANKCLAW_SANDBOX
