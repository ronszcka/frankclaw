_version: 1
audit.auth.disabled: "L'autenticazione del gateway è disabilitata — chiunque abbia accesso alla rete può connettersi"
audit.auth.disabled_fix: "Imposta gateway.auth in modalità token o password. Esegui: frankclaw gen-token"
audit.auth.password_empty: "L'autenticazione tramite password è configurata ma l'hash della password è vuoto"
audit.auth.password_empty_fix: "Imposta un hash della password: frankclaw hash-password"
audit.auth.token_short: Il token del gateway è più corto di 16 caratteri
audit.auth.token_short_fix: "Genera un token più robusto: frankclaw gen-token"
audit.channels.invalid_policy: "Il canale '%{channel}' ha una politica di sicurezza non valida"
audit.channels.invalid_policy_fix: Verifica la configurazione extra del canale per i campi di policy validi
audit.channels.open_groups: "Il canale '%{channel}' risponde a tutti i messaggi di gruppo senza filtro per menzione o lista consentiti"
audit.channels.open_groups_fix: "Imposta extra.require_mention_for_groups=true o configura extra.allowed_groups per '%{channel}'"
audit.channels.whatsapp_no_secret: Il canale WhatsApp non ha app_secret — le firme dei webhook non sono verificate
audit.channels.whatsapp_no_secret_fix: "Imposta app_secret_env nella configurazione dell'account WhatsApp"
audit.clean: Nessun problema di sicurezza trovato. La configurazione sembra corretta.
audit.encrypt.media_off: La crittografia dei file multimediali è disabilitata
audit.encrypt.media_off_fix: Imposta security.encrypt_media su true se i file multimediali contengono contenuti sensibili
audit.encrypt.no_master_key: La crittografia delle sessioni è abilitata ma FRANKCLAW_MASTER_KEY non è impostata — le sessioni falliranno
audit.encrypt.no_master_key_fix: "Genera ed esporta: export FRANKCLAW_MASTER_KEY=$(frankclaw gen-token)"
audit.encrypt.sessions_off: La crittografia delle trascrizioni delle sessioni è disabilitata — le trascrizioni sono memorizzate in testo in chiaro
audit.encrypt.sessions_off_fix: Imposta security.encrypt_sessions su true ed esporta FRANKCLAW_MASTER_KEY
audit.failed: Audit FALLITO — correggi i problemi CRIT/HIGH prima del deploy.
audit.fix_label: "Soluzione: %{remediation}"
audit.fs.config_world_readable: "Il file di configurazione ha permessi %{mode} — leggibile da altri utenti"
audit.fs.config_world_readable_fix: "chmod 600 %{path}"
audit.fs.db_world_readable: "Il database delle sessioni ha permessi %{mode} — leggibile da altri utenti"
audit.fs.db_world_readable_fix: "chmod 600 %{path}"
audit.fs.state_world_readable: "La directory di stato ha permessi %{mode} — accessibile da altri utenti"
audit.fs.state_world_readable_fix: "chmod 700 %{path}"
audit.media.scanning_off: Nessun servizio di scansione file configurato — i file vengono archiviati senza controlli malware
audit.media.scanning_off_fix: "Imposta la variabile d'ambiente VIRUSTOTAL_API_KEY per abilitare la scansione VirusTotal"
audit.media.scanning_on: "La scansione file VirusTotal è abilitata — i file vengono analizzati per malware prima dell'archiviazione"
audit.media.scanning_on_fix: Nessuna azione necessaria
audit.network.exposed_no_auth: Il gateway è esposto in rete senza autenticazione
audit.network.exposed_no_auth_fix: "Effettua il binding solo su loopback oppure configura l'auth: frankclaw gen-token"
audit.network.no_tls: Il gateway è esposto in rete senza TLS — le credenziali vengono inviate in chiaro
audit.network.no_tls_fix: "Configura TLS, usa un reverse proxy con terminazione TLS oppure limita l'accesso a una rete Tailscale"
audit.network.ssrf_off: La protezione SSRF è disabilitata — le richieste in uscita possono raggiungere reti private
audit.network.ssrf_off_fix: Imposta security.ssrf_protection su true
audit.passed: Audit superato con avvertenze.
audit.secrets.channel_missing_env: "Il canale '%{channel}' fa riferimento alla variabile d'ambiente '%{env}' (tramite %{key}) che non è impostata"
audit.secrets.channel_missing_env_fix: "Esporta: export %{env}=<valore>"
audit.secrets.inline: "Il canale '%{channel}' ha '%{key}' memorizzato inline nel file di configurazione"
audit.secrets.inline_fix: "Sposta nella variabile d'ambiente: rinomina '%{key}' in '%{env_key}' e imposta il valore nell'ambiente"
audit.secrets.missing_env: "Il provider '%{id}' fa riferimento alla variabile d'ambiente '%{env}' che non è impostata"
audit.secrets.missing_env_fix: "Esporta la chiave API: export %{env}=<la-tua-chiave>"
audit.secrets.no_key_ref: "Il provider '%{id}' non ha api_key_ref — la chiave API potrebbe essere mancante o codificata altrove"
audit.secrets.no_key_ref_fix: "Imposta models.providers[%{id}].api_key_ref con il nome di una variabile d'ambiente"
audit.secrets.token_inline: Il token di autenticazione del gateway è memorizzato inline nel file di configurazione
audit.secrets.token_inline_fix: "Assicurati che i permessi del file di configurazione siano 0600 (solo proprietario). Considera l'uso della variabile d'ambiente FRANKCLAW_AUTH_TOKEN se supportato."
audit.separator: ============================
audit.summary: "Riepilogo: %{crit} CRIT, %{high} HIGH, %{med} MED, %{low} LOW, %{info} INFO"
audit.title: Audit di Sicurezza FrankClaw
audit.tools.approval_level: "Livello di approvazione strumenti: %{level}"
audit.tools.approval_level_fix: "Imposta FRANKCLAW_TOOL_APPROVAL=readonly|mutating|destructive per controllare"
audit.tools.bash_allow_all: La policy dello strumento bash è allow-all — gli agenti possono eseguire qualsiasi comando shell
audit.tools.bash_allow_all_fix: Imposta FRANKCLAW_BASH_POLICY con una lista separata da virgole dei binari consentiti, oppure deny-all
audit.tools.bash_allowlist: "La lista consentiti dello strumento bash permette %{count} comando/i: %{commands}"
audit.tools.bash_allowlist_fix: Rivedi la lista consentiti e rimuovi i comandi non necessari
audit.tools.bash_deny_all: Lo strumento bash è configurato per gli agenti ma la policy è deny-all (impostazione predefinita sicura)
audit.tools.bash_deny_all_fix: "Se l'esecuzione bash è necessaria, imposta FRANKCLAW_BASH_POLICY con una lista consentiti"
audit.tools.destructive_approved: Gli strumenti distruttivi sono approvati — gli agenti possono eseguire operazioni irreversibili
audit.tools.destructive_approved_fix: Imposta FRANKCLAW_TOOL_APPROVAL=mutating o readonly a meno che le operazioni distruttive non siano intenzionali
audit.tools.mutating_approved: Gli strumenti di mutazione sono approvati — gli agenti possono cliccare, digitare ed eseguire comandi shell
audit.tools.mutating_approved_fix: Imposta FRANKCLAW_TOOL_APPROVAL=readonly se la mutazione non è necessaria
audit.tools.no_sandbox: "Lo strumento bash non ha sandbox — i comandi vengono eseguiti direttamente sull'host"
audit.tools.no_sandbox_fix: "Imposta FRANKCLAW_SANDBOX=ai-jail o ai-jail-lockdown per l'isolamento a livello di sistema operativo (richiede ai-jail)"
audit.tools.sandbox_aijail: "Sandbox dello strumento bash: ai-jail (bubblewrap + landlock, rete consentita)"
audit.tools.sandbox_aijail_fix: Per un isolamento più rigido, usa FRANKCLAW_SANDBOX=ai-jail-lockdown
audit.tools.sandbox_lockdown: "Sandbox dello strumento bash: ai-jail lockdown (filesystem in sola lettura, nessuna rete)"
audit.tools.sandbox_lockdown_fix: Questa è la modalità sandbox più restrittiva
audit.tools.sandbox_missing: "FRANKCLAW_SANDBOX=%{mode} è impostato ma il binario ai-jail non è stato trovato nel PATH"
audit.tools.sandbox_missing_fix: Installa ai-jail o disimposta FRANKCLAW_SANDBOX
