audit.title: FrankClaw 보안 감사
audit.tools.approval_level: "도구 승인 수준: %{level}"
audit.tools.approval_level_fix: "FRANKCLAW_TOOL_APPROVAL=readonly|mutating|destructive로 제어하세요"
audit.tools.bash_allow_all: Bash 도구 정책이 allow-all입니다 — 에이전트가 모든 셸 명령을 실행할 수 있습니다
audit.tools.bash_allow_all_fix: FRANKCLAW_BASH_POLICY를 허용된 바이너리의 쉼표 구분 목록으로 설정하거나 deny-all로 설정하세요
audit.tools.bash_allowlist: "Bash 도구 허용 목록에 %{count}개 명령이 허용되어 있습니다: %{commands}"
