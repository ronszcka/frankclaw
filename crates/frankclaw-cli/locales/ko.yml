_version: 1
audit.auth.disabled: 게이트웨이 인증이 비활성화되어 있습니다 — 네트워크 접근 권한이 있는 누구나 연결할 수 있습니다
audit.auth.disabled_fix: "gateway.auth를 토큰 또는 비밀번호 모드로 설정하세요. 실행: frankclaw gen-token"
audit.auth.password_empty: 비밀번호 인증이 설정되어 있지만 비밀번호 해시가 비어 있습니다
audit.auth.password_empty_fix: "비밀번호 해시를 설정하세요: frankclaw hash-password"
audit.auth.token_short: 게이트웨이 토큰이 16자 미만입니다
audit.auth.token_short_fix: "더 강력한 토큰을 생성하세요: frankclaw gen-token"
audit.channels.invalid_policy: "채널 '%{channel}'의 보안 정책이 잘못되었습니다"
audit.channels.invalid_policy_fix: 채널의 추가 설정에서 유효한 정책 필드를 확인하세요
audit.channels.open_groups: "채널 '%{channel}'이 멘션 게이팅이나 허용 목록 없이 모든 그룹 메시지에 응답합니다"
audit.channels.open_groups_fix: "'%{channel}'에 extra.require_mention_for_groups=true를 설정하거나 extra.allowed_groups를 구성하세요"
audit.channels.whatsapp_no_secret: WhatsApp 채널에 app_secret가 없습니다 — 웹훅 서명이 검증되지 않습니다
audit.channels.whatsapp_no_secret_fix: WhatsApp 계정 설정에 app_secret_env를 설정하세요
audit.clean: 보안 문제가 발견되지 않았습니다. 설정이 양호합니다.
audit.encrypt.media_off: 미디어 파일 암호화가 비활성화되어 있습니다
audit.encrypt.media_off_fix: 미디어 파일에 민감한 내용이 포함되어 있으면 security.encrypt_media를 true로 설정하세요
audit.encrypt.no_master_key: 세션 암호화가 활성화되어 있지만 FRANKCLAW_MASTER_KEY가 설정되지 않았습니다 — 세션이 실패합니다
audit.encrypt.no_master_key_fix: "생성 및 내보내기: export FRANKCLAW_MASTER_KEY=$(frankclaw gen-token)"
audit.encrypt.sessions_off: 세션 기록 암호화가 비활성화되어 있습니다 — 기록이 평문으로 저장됩니다
audit.encrypt.sessions_off_fix: security.encrypt_sessions를 true로 설정하고 FRANKCLAW_MASTER_KEY를 내보내세요
audit.failed: 감사 실패 — 배포 전에 CRIT/HIGH 문제를 수정하세요.
audit.fix_label: "조치: %{remediation}"
audit.fs.config_world_readable: "설정 파일의 권한이 %{mode}입니다 — 다른 사용자가 읽을 수 있습니다"
audit.fs.config_world_readable_fix: "chmod 600 %{path}"
audit.fs.db_world_readable: "세션 데이터베이스의 권한이 %{mode}입니다 — 다른 사용자가 읽을 수 있습니다"
audit.fs.db_world_readable_fix: "chmod 600 %{path}"
audit.fs.state_world_readable: "상태 디렉터리의 권한이 %{mode}입니다 — 다른 사용자가 접근할 수 있습니다"
audit.fs.state_world_readable_fix: "chmod 700 %{path}"
audit.media.scanning_off: 파일 검사 서비스가 설정되지 않았습니다 — 파일이 악성코드 검사 없이 저장됩니다
audit.media.scanning_off_fix: VirusTotal 검사를 활성화하려면 VIRUSTOTAL_API_KEY 환경 변수를 설정하세요
audit.media.scanning_on: VirusTotal 파일 검사가 활성화되어 있습니다 — 파일이 저장 전에 악성코드 검사를 받습니다
audit.media.scanning_on_fix: 조치가 필요하지 않습니다
audit.network.exposed_no_auth: 게이트웨이가 인증 없이 네트워크에 노출되어 있습니다
audit.network.exposed_no_auth_fix: "루프백에만 바인드하거나 인증을 설정하세요: frankclaw gen-token"
audit.network.no_tls: 게이트웨이가 TLS 없이 네트워크에 노출되어 있습니다 — 자격 증명이 평문으로 전송됩니다
audit.network.no_tls_fix: TLS를 설정하거나, TLS 종료가 가능한 리버스 프록시를 사용하거나, Tailscale 네트워크로 제한하세요
audit.network.ssrf_off: SSRF 보호가 비활성화되어 있습니다 — 아웃바운드 요청이 사설 네트워크에 도달할 수 있습니다
audit.network.ssrf_off_fix: security.ssrf_protection을 true로 설정하세요
audit.passed: 감사 통과 (경고 있음).
audit.secrets.channel_missing_env: "채널 '%{channel}'이 설정되지 않은 환경 변수 '%{env}'를 (%{key}를 통해) 참조하고 있습니다"
audit.secrets.channel_missing_env_fix: "내보내기: export %{env}=<value>"
audit.secrets.inline: "채널 '%{channel}'의 '%{key}'가 설정 파일에 인라인으로 저장되어 있습니다"
audit.secrets.inline_fix: "환경 변수로 이동하세요: '%{key}'를 '%{env_key}'로 변경하고 환경에서 값을 설정하세요"
audit.secrets.missing_env: "프로바이더 '%{id}'가 설정되지 않은 환경 변수 '%{env}'를 참조하고 있습니다"
audit.secrets.missing_env_fix: "API 키를 내보내세요: export %{env}=<your-key>"
audit.secrets.no_key_ref: "프로바이더 '%{id}'에 api_key_ref가 없습니다 — API 키가 누락되었거나 다른 곳에 하드코딩되어 있을 수 있습니다"
audit.secrets.no_key_ref_fix: "models.providers[%{id}].api_key_ref를 환경 변수 이름으로 설정하세요"
audit.secrets.token_inline: 게이트웨이 인증 토큰이 설정 파일에 인라인으로 저장되어 있습니다
audit.secrets.token_inline_fix: 설정 파일 권한을 0600(소유자 전용)으로 설정하세요. 지원되는 경우 FRANKCLAW_AUTH_TOKEN 환경 변수 사용을 고려하세요.
