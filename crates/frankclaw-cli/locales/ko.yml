audit.tools.bash_deny_all: Bash 도구가 에이전트용으로 설정되어 있지만 정책이 deny-all입니다 (안전한 기본값)
audit.tools.bash_deny_all_fix: Bash 실행이 필요하면 FRANKCLAW_BASH_POLICY를 허용 목록으로 설정하세요
audit.tools.destructive_approved: 파괴적 도구가 승인되었습니다 — 에이전트가 되돌릴 수 없는 작업을 수행할 수 있습니다
audit.tools.destructive_approved_fix: 파괴적 작업이 의도된 것이 아니라면 FRANKCLAW_TOOL_APPROVAL=mutating 또는 readonly로 설정하세요
audit.tools.mutating_approved: 변경 도구가 승인되었습니다 — 에이전트가 클릭, 입력 및 셸 명령을 실행할 수 있습니다
audit.tools.mutating_approved_fix: 변경이 필요하지 않으면 FRANKCLAW_TOOL_APPROVAL=readonly로 설정하세요
audit.tools.no_sandbox: Bash 도구에 샌드박스가 없습니다 — 명령이 호스트에서 직접 실행됩니다
audit.tools.no_sandbox_fix: OS 수준 격리를 위해 FRANKCLAW_SANDBOX=ai-jail 또는 ai-jail-lockdown을 설정하세요 (ai-jail 필요)
audit.tools.sandbox_aijail: "Bash 도구 샌드박스: ai-jail (bubblewrap + landlock, 네트워크 허용)"
audit.tools.sandbox_aijail_fix: 더 엄격한 격리를 위해 FRANKCLAW_SANDBOX=ai-jail-lockdown을 사용하세요
audit.tools.sandbox_lockdown: "Bash 도구 샌드박스: ai-jail lockdown (읽기 전용 파일시스템, 네트워크 차단)"
audit.tools.sandbox_lockdown_fix: 가장 엄격한 샌드박스 모드입니다
audit.tools.sandbox_missing: "FRANKCLAW_SANDBOX=%{mode}가 설정되어 있지만 ai-jail 바이너리가 PATH에 없습니다"
audit.tools.sandbox_missing_fix: ai-jail을 설치하거나 FRANKCLAW_SANDBOX 설정을 해제하세요
