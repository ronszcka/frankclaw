_version: 1
audit.auth.disabled: "L'authentification de la passerelle est désactivée — toute personne ayant accès au réseau peut se connecter"
audit.auth.disabled_fix: "Définissez gateway.auth en mode jeton ou mot de passe. Lancez : frankclaw gen-token"
audit.auth.password_empty: "L'authentification par mot de passe est configurée mais le hash du mot de passe est vide"
audit.auth.password_empty_fix: "Définissez un hash de mot de passe : frankclaw hash-password"
audit.auth.token_short: Le jeton de la passerelle fait moins de 16 caractères
audit.auth.token_short_fix: "Générez un jeton plus fort : frankclaw gen-token"
audit.channels.invalid_policy: "Le canal '%{channel}' a une politique de sécurité invalide"
audit.channels.invalid_policy_fix: Vérifiez la configuration supplémentaire du canal pour des champs de politique valides
audit.channels.open_groups: "Le canal '%{channel}' répond à tous les messages de groupe sans filtrage par mention ni liste autorisée"
audit.channels.open_groups_fix: "Définissez extra.require_mention_for_groups=true ou configurez extra.allowed_groups pour '%{channel}'"
audit.channels.whatsapp_no_secret: "Le canal WhatsApp n'a pas de app_secret — les signatures des webhooks ne sont pas vérifiées"
audit.channels.whatsapp_no_secret_fix: Définissez app_secret_env dans la configuration du compte WhatsApp
audit.clean: Aucun problème de sécurité trouvé. La configuration semble correcte.
audit.encrypt.media_off: Le chiffrement des fichiers média est désactivé
audit.encrypt.media_off_fix: Définissez security.encrypt_media à true si les fichiers média contiennent des données sensibles
audit.encrypt.no_master_key: "Le chiffrement des sessions est activé mais FRANKCLAW_MASTER_KEY n'est pas défini — les sessions échoueront"
audit.encrypt.no_master_key_fix: "Générez et exportez : export FRANKCLAW_MASTER_KEY=$(frankclaw gen-token)"
audit.encrypt.sessions_off: Le chiffrement des transcriptions de session est désactivé — les transcriptions sont stockées en clair
audit.encrypt.sessions_off_fix: Définissez security.encrypt_sessions à true et exportez FRANKCLAW_MASTER_KEY
audit.failed: "L'audit a ÉCHOUÉ — corrigez les problèmes critiques/élevés avant le déploiement."
audit.fix_label: "Correction : %{remediation}"
audit.fs.config_world_readable: "Le fichier de configuration a les permissions %{mode} — lisible par d'autres utilisateurs"
audit.fs.config_world_readable_fix: "chmod 600 %{path}"
audit.fs.db_world_readable: "La base de données des sessions a les permissions %{mode} — lisible par d'autres utilisateurs"
audit.fs.db_world_readable_fix: "chmod 600 %{path}"
audit.fs.state_world_readable: "Le répertoire d'état a les permissions %{mode} — accessible par d'autres utilisateurs"
audit.fs.state_world_readable_fix: "chmod 700 %{path}"
audit.media.scanning_off: "Aucun service d'analyse de fichiers configuré — les fichiers sont stockés sans vérification de logiciels malveillants"
audit.media.scanning_off_fix: "Définissez la variable d'environnement VIRUSTOTAL_API_KEY pour activer l'analyse VirusTotal"
audit.media.scanning_on: "L'analyse de fichiers VirusTotal est activée — les fichiers sont analysés pour les logiciels malveillants avant le stockage"
audit.media.scanning_on_fix: Aucune action nécessaire
audit.network.exposed_no_auth: La passerelle est exposée au réseau sans authentification
audit.network.exposed_no_auth_fix: "Limitez la liaison au loopback uniquement, ou configurez l'authentification : frankclaw gen-token"
audit.network.no_tls: La passerelle est exposée au réseau sans TLS — les identifiants sont envoyés en clair
audit.network.no_tls_fix: Configurez TLS, utilisez un reverse proxy avec terminaison TLS, ou restreignez à un réseau Tailscale
audit.network.ssrf_off: La protection SSRF est désactivée — les requêtes sortantes peuvent atteindre les réseaux privés
audit.network.ssrf_off_fix: Définissez security.ssrf_protection à true
audit.passed: "L'audit est passé avec des avertissements."
audit.secrets.channel_missing_env: "Le canal '%{channel}' référence la variable d'environnement '%{env}' (via %{key}) qui n'est pas définie"
audit.secrets.channel_missing_env_fix: "Exportez : export %{env}=<valeur>"
audit.secrets.inline: "Le canal '%{channel}' a '%{key}' stocké en clair dans le fichier de configuration"
audit.secrets.inline_fix: "Déplacez vers une variable d'environnement : renommez '%{key}' en '%{env_key}' et définissez la valeur dans l'environnement"
audit.secrets.missing_env: "Le fournisseur '%{id}' référence la variable d'environnement '%{env}' qui n'est pas définie"
audit.secrets.missing_env_fix: "Exportez la clé API : export %{env}=<votre-clé>"
audit.secrets.no_key_ref: "Le fournisseur '%{id}' n'a pas de api_key_ref — la clé API est peut-être manquante ou codée en dur ailleurs"
audit.secrets.no_key_ref_fix: "Définissez models.providers[%{id}].api_key_ref avec le nom d'une variable d'environnement"
audit.secrets.token_inline: "Le jeton d'authentification de la passerelle est stocké en clair dans le fichier de configuration"
audit.secrets.token_inline_fix: "Assurez-vous que les permissions du fichier de configuration sont 0600 (propriétaire uniquement). Envisagez d'utiliser la variable d'environnement FRANKCLAW_AUTH_TOKEN si disponible."
audit.separator: ===========================
audit.summary: "Résumé : %{crit} critique(s), %{high} élevé(s), %{med} moyen(s), %{low} faible(s), %{info} info"
audit.title: Audit de sécurité FrankClaw
audit.tools.approval_level: "Niveau d'approbation des outils : %{level}"
audit.tools.approval_level_fix: "Définissez FRANKCLAW_TOOL_APPROVAL=readonly|mutating|destructive pour contrôler"
audit.tools.bash_allow_all: "La politique de l'outil bash est allow-all — les agents peuvent exécuter n'importe quelle commande shell"
audit.tools.bash_allow_all_fix: Définissez FRANKCLAW_BASH_POLICY avec une liste de binaires autorisés séparés par des virgules, ou deny-all
audit.tools.bash_allowlist: "La liste autorisée de l'outil bash permet %{count} commande(s) : %{commands}"
audit.tools.bash_allowlist_fix: Vérifiez la liste autorisée et supprimez les commandes inutiles
audit.tools.bash_deny_all: "L'outil bash est configuré pour les agents mais la politique est deny-all (valeur par défaut sécurisée)"
audit.tools.bash_deny_all_fix: "Si l'exécution bash est nécessaire, définissez FRANKCLAW_BASH_POLICY avec une liste autorisée"
audit.tools.destructive_approved: Les outils destructifs sont approuvés — les agents peuvent effectuer des opérations irréversibles
audit.tools.destructive_approved_fix: Définissez FRANKCLAW_TOOL_APPROVAL=mutating ou readonly sauf si les opérations destructives sont intentionnelles
audit.tools.mutating_approved: Les outils de mutation sont approuvés — les agents peuvent cliquer, taper et exécuter des commandes shell
audit.tools.mutating_approved_fix: "Définissez FRANKCLAW_TOOL_APPROVAL=readonly si la mutation n'est pas nécessaire"
audit.tools.no_sandbox: "L'outil bash n'a pas de sandbox — les commandes s'exécutent directement sur l'hôte"
audit.tools.no_sandbox_fix: "Définissez FRANKCLAW_SANDBOX=ai-jail ou ai-jail-lockdown pour l'isolation au niveau OS (nécessite ai-jail)"
audit.tools.sandbox_aijail: "Sandbox de l'outil bash : ai-jail (bubblewrap + landlock, réseau autorisé)"
audit.tools.sandbox_aijail_fix: Pour une isolation plus stricte, utilisez FRANKCLAW_SANDBOX=ai-jail-lockdown
audit.tools.sandbox_lockdown: "Sandbox de l'outil bash : ai-jail lockdown (système de fichiers en lecture seule, pas de réseau)"
audit.tools.sandbox_lockdown_fix: "C'est le mode sandbox le plus restrictif"
audit.tools.sandbox_missing: "FRANKCLAW_SANDBOX=%{mode} est défini mais le binaire ai-jail est introuvable dans le PATH"
audit.tools.sandbox_missing_fix: Installez ai-jail ou supprimez la variable FRANKCLAW_SANDBOX
browser.invalid_url: "les outils navigateur sont activés mais FRANKCLAW_BROWSER_DEVTOOLS_URL est invalide : %{error}"
browser.mutations_blocked: les outils de mutation navigateur sont configurés mais bloqués — définissez FRANKCLAW_TOOL_APPROVAL=mutating (ou FRANKCLAW_ALLOW_BROWSER_MUTATIONS=1) pour les activer
