_version: 1
audit.auth.disabled: Gateway authentication is disabled — anyone with network access can connect
audit.auth.disabled_fix: "Set gateway.auth to token or password mode. Run: frankclaw gen-token"
audit.auth.password_empty: Password auth is configured but password hash is empty
audit.auth.password_empty_fix: "Set a password hash: frankclaw hash-password"
audit.auth.token_short: Gateway token is shorter than 16 characters
audit.auth.token_short_fix: "Generate a stronger token: frankclaw gen-token"
audit.channels.invalid_policy: "Channel '%{channel}' has an invalid security policy"
audit.channels.invalid_policy_fix: "Check the channel's extra configuration for valid policy fields"
audit.channels.open_groups: "Channel '%{channel}' responds to all group messages without mention gating or allowlist"
audit.channels.open_groups_fix: "Set extra.require_mention_for_groups=true or configure extra.allowed_groups for '%{channel}'"
audit.channels.whatsapp_no_secret: WhatsApp channel has no app_secret — webhook signatures are not verified
audit.channels.whatsapp_no_secret_fix: Set app_secret_env in the WhatsApp account config
audit.clean: No security issues found. Configuration looks good.
audit.encrypt.media_off: Media file encryption is disabled
audit.encrypt.media_off_fix: Set security.encrypt_media to true if media files contain sensitive content
audit.encrypt.no_master_key: Session encryption is enabled but FRANKCLAW_MASTER_KEY is not set — sessions will fail
audit.encrypt.no_master_key_fix: "Generate and export: export FRANKCLAW_MASTER_KEY=$(frankclaw gen-token)"
audit.encrypt.sessions_off: Session transcript encryption is disabled — transcripts stored in plaintext
audit.encrypt.sessions_off_fix: Set security.encrypt_sessions to true and export FRANKCLAW_MASTER_KEY
audit.failed: Audit FAILED — fix critical/high issues before deploying.
audit.fix_label: "Fix: %{remediation}"
audit.fs.config_world_readable: "Config file has permissions %{mode} — readable by other users"
audit.fs.config_world_readable_fix: "chmod 600 %{path}"
audit.fs.db_world_readable: "Sessions database has permissions %{mode} — readable by other users"
audit.fs.db_world_readable_fix: "chmod 600 %{path}"
audit.fs.state_world_readable: "State directory has permissions %{mode} — accessible by other users"
audit.fs.state_world_readable_fix: "chmod 700 %{path}"
audit.media.scanning_off: No file scanning service configured — files are stored without malware checks
audit.media.scanning_off_fix: Set VIRUSTOTAL_API_KEY environment variable to enable VirusTotal scanning
audit.media.scanning_on: VirusTotal file scanning is enabled — files are scanned for malware before storage
audit.media.scanning_on_fix: No action needed
audit.network.exposed_no_auth: Gateway is network-exposed with no authentication
audit.network.exposed_no_auth_fix: "Either bind to loopback only, or configure auth: frankclaw gen-token"
audit.network.no_tls: Gateway is network-exposed without TLS — credentials sent in cleartext
audit.network.no_tls_fix: Configure TLS, use a reverse proxy with TLS termination, or restrict to a Tailscale network
audit.network.ssrf_off: SSRF protection is disabled — outbound requests can reach private networks
audit.network.ssrf_off_fix: Set security.ssrf_protection to true
audit.passed: Audit passed with warnings.
audit.secrets.channel_missing_env: "Channel '%{channel}' references env var '%{env}' (via %{key}) which is not set"
audit.secrets.channel_missing_env_fix: "Export: export %{env}=<value>"
audit.secrets.inline: "Channel '%{channel}' has '%{key}' stored inline in config file"
audit.secrets.inline_fix: "Move to env var: rename '%{key}' to '%{env_key}' and set the value in the environment"
audit.secrets.missing_env: "Provider '%{id}' references env var '%{env}' which is not set"
audit.secrets.missing_env_fix: "Export the API key: export %{env}=<your-key>"
audit.secrets.no_key_ref: "Provider '%{id}' has no api_key_ref — API key may be missing or hardcoded elsewhere"
audit.secrets.no_key_ref_fix: "Set models.providers[%{id}].api_key_ref to an env var name"
audit.secrets.token_inline: Gateway auth token is stored inline in config file
audit.secrets.token_inline_fix: Ensure config file permissions are 0600 (owner-only). Consider using FRANKCLAW_AUTH_TOKEN env var if supported.
audit.separator: ========================
audit.summary: "Summary: %{crit} critical, %{high} high, %{med} medium, %{low} low, %{info} info"
audit.title: FrankClaw Security Audit
audit.tools.approval_level: "Tool approval level: %{level}"
audit.tools.approval_level_fix: "Set FRANKCLAW_TOOL_APPROVAL=readonly|mutating|destructive to control"
audit.tools.bash_allow_all: Bash tool policy is allow-all — agents can execute any shell command
audit.tools.bash_allow_all_fix: Set FRANKCLAW_BASH_POLICY to a comma-separated allowlist of permitted binaries, or deny-all
audit.tools.bash_allowlist: "Bash tool allowlist permits %{count} command(s): %{commands}"
audit.tools.bash_allowlist_fix: Review the allowlist and remove any unnecessary commands
audit.tools.bash_deny_all: Bash tool is configured for agents but policy is deny-all (safe default)
audit.tools.bash_deny_all_fix: If bash execution is needed, set FRANKCLAW_BASH_POLICY to an allowlist
audit.tools.destructive_approved: Destructive tools are approved — agents can perform irreversible operations
audit.tools.destructive_approved_fix: Set FRANKCLAW_TOOL_APPROVAL=mutating or readonly unless destructive operations are intended
audit.tools.mutating_approved: Mutating tools are approved — agents can click, type, and run shell commands
audit.tools.mutating_approved_fix: Set FRANKCLAW_TOOL_APPROVAL=readonly if mutation is not needed
audit.tools.no_sandbox: Bash tool has no sandbox — commands run directly on the host
audit.tools.no_sandbox_fix: Set FRANKCLAW_SANDBOX=ai-jail or ai-jail-lockdown for OS-level isolation (requires ai-jail)
audit.tools.sandbox_aijail: "Bash tool sandbox: ai-jail (bubblewrap + landlock, network allowed)"
audit.tools.sandbox_aijail_fix: For stricter isolation, use FRANKCLAW_SANDBOX=ai-jail-lockdown
audit.tools.sandbox_lockdown: "Bash tool sandbox: ai-jail lockdown (read-only filesystem, no network)"
audit.tools.sandbox_lockdown_fix: This is the most restrictive sandbox mode
audit.tools.sandbox_missing: "FRANKCLAW_SANDBOX=%{mode} is set but ai-jail binary not found on PATH"
audit.tools.sandbox_missing_fix: Install ai-jail or unset FRANKCLAW_SANDBOX
